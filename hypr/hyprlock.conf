# ~/.config/hypr/hyprlock.conf

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
}

background {
    path = screenshot  # Ambil screenshot layar saat ini
    blur_size = 0.5
    blur_passes = 3
    noise = 0.05
    contrast = 1.1
    brightness = 0.8
    vibrancy = 0.5
    vibrancy_darkness = 0.2
}

input-field {
    size = 300, 50
    position = 0, 0
    halign = center
    valign = center
    
    placeholder_text = 🔒 Enter password...
    fade_on_empty = true
    hide_input = false
    
    font_color = rgb(255, 255, 255)
    inner_color = rgba(255, 255, 255, 0.1)
    outer_color = rgba(0, 0, 0, 0)
    
    check_color = rgba(50, 205, 50, 1)   # Hijau saat benar
    fail_color = rgba(220, 20, 60, 1)    # Merah saat salah
    
    rounding = 10
    dots_spacing = 0.3
    dots_center = true
}

label {
    position = 0, 80
    halign = center
    valign = center
    text = $TIME
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    color = rgba(255, 255, 255, 0.9)
    
    shadow_passes = 3
    shadow_size = 4
}
label {
    position = 20, -20
    halign = left
    valign = bottom
    text = cmd[update:0] echo "$USER@$(hostname)"
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    color = rgba(255, 255, 255, 0.6)
}